<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RGR Asset QR Codes — Export</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1a1a1a;
      background: #f0f0f0;
    }

    /* ── Login ── */
    .login-box {
      max-width: 320px;
      margin: 100px auto;
      text-align: center;
    }
    .login-box h2 { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
    .login-box input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-box button:hover { background: #333; }
    .login-box button:disabled { background: #999; cursor: default; }
    .login-error { color: #c00; font-size: 13px; margin-bottom: 12px; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 100px 20px; color: #666; font-size: 14px; }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid #ddd; border-top-color: #1a1a1a;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toolbar (screen only) ── */
    .toolbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px;
      background: #1a1a1a; color: #fff;
    }
    .toolbar .count { font-size: 13px; opacity: 0.7; }
    .toolbar button {
      padding: 8px 20px;
      background: #fff; color: #1a1a1a;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
    }
    .toolbar button:hover { background: #e0e0e0; }
    .toolbar button:disabled { opacity: 0.5; cursor: default; }

    /* ── PDF Pages Container ── */
    #pdf-content { background: #fff; }

    /* ── Each page: A4 proportions, 8 cards in 2x4 grid ── */
    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 12mm 15mm;
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    .page-header {
      text-align: center;
      padding-bottom: 8mm;
      border-bottom: 1.5px solid #1a1a1a;
      margin-bottom: 6mm;
    }
    .page-header h1 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2px;
    }
    .page-header .page-sub {
      font-size: 10px;
      color: #888;
    }
    .page-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(4, 1fr);
      gap: 5mm;
    }
    .qr-card {
      border: 1.5px solid #ddd;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 5mm 6mm;
      gap: 5mm;
    }
    .qr-card canvas { flex-shrink: 0; }
    .qr-info { flex: 1; min-width: 0; }
    .qr-label {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1.1;
    }
    .qr-type {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .qr-uuid {
      font-size: 7px;
      color: #aaa;
      margin-top: 4px;
      word-break: break-all;
      font-family: monospace;
    }
    .page-footer {
      text-align: center;
      padding-top: 4mm;
      font-size: 9px;
      color: #bbb;
    }

    /* ── Screen preview: show pages with shadows ── */
    @media screen {
      #pdf-content { padding: 20px 0; }
      .page {
        box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        margin-bottom: 20px;
        border-radius: 4px;
      }
    }

    .empty-state { text-align: center; padding: 60px; color: #999; font-size: 14px; background: #fff; }
  </style>
</head>
<body>

  <!-- Sign In -->
  <div id="login-screen" class="login-box">
    <h2>RGR QR Export</h2>
    <div id="login-error" class="login-error" style="display:none;"></div>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button id="login-btn">Sign In</button>
  </div>

  <!-- Loading -->
  <div id="loading-screen" class="loading" style="display:none;">
    <div class="spinner"></div>
    <div>Fetching assets...</div>
  </div>

  <!-- QR Output -->
  <div id="qr-output" style="display:none;">
    <div class="toolbar" id="toolbar">
      <span class="count" id="asset-count"></span>
      <button id="export-btn" onclick="exportPDF()">Export PDF</button>
    </div>
    <div id="pdf-content"></div>
    <div id="empty" class="empty-state" style="display:none;">
      No active assets found in the database.
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://eryhwfkqbbuftepjvgwq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyeWh3ZmtxYmJ1ZnRlcGp2Z3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwOTA4NjksImV4cCI6MjA4NjY2Njg2OX0.hFNt3C6MKjHzoFekIPSObddNJ-hNfJXfJWPn7Dbsw20';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const CARDS_PER_PAGE = 8;

    // ── Login ──
    const loginBtn = document.getElementById('login-btn');
    const errorEl = document.getElementById('login-error');

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      errorEl.style.display = 'none';

      if (!email || !password) {
        errorEl.textContent = 'Enter email and password.';
        errorEl.style.display = 'block';
        return;
      }

      loginBtn.textContent = 'Signing in...';
      loginBtn.disabled = true;

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        loginBtn.textContent = 'Sign In';
        loginBtn.disabled = false;
        return;
      }

      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('loading-screen').style.display = 'block';
      await fetchAndRender();
    }

    loginBtn.addEventListener('click', handleLogin);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

    // ── Fetch & Render ──
    async function fetchAndRender() {
      const { data: assets, error } = await sb
        .from('assets')
        .select('id, asset_number, category, status')
        .is('deleted_at', null)
        .order('asset_number', { ascending: true });

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('qr-output').style.display = 'block';

      if (error) {
        document.getElementById('empty').style.display = 'block';
        document.getElementById('empty').textContent = 'Error: ' + error.message;
        return;
      }

      if (!assets || assets.length === 0) {
        document.getElementById('empty').style.display = 'block';
        return;
      }

      // Sort: trailers first, then dollies, then other
      const order = { trailer: 0, dolly: 1 };
      const sorted = assets.slice().sort((a, b) => {
        const ca = order[a.category] ?? 2;
        const cb = order[b.category] ?? 2;
        if (ca !== cb) return ca - cb;
        return a.asset_number.localeCompare(b.asset_number);
      });

      // Build pages of 8
      const pdfContent = document.getElementById('pdf-content');
      const totalPages = Math.ceil(sorted.length / CARDS_PER_PAGE);

      for (let p = 0; p < totalPages; p++) {
        const pageAssets = sorted.slice(p * CARDS_PER_PAGE, (p + 1) * CARDS_PER_PAGE);
        const page = document.createElement('div');
        page.className = 'page';

        // Header
        const header = document.createElement('div');
        header.className = 'page-header';
        header.innerHTML = '<h1>RGR Fleet — Asset QR Codes</h1>' +
          '<span class="page-sub">Scan with the RGR app &nbsp;|&nbsp; Page ' + (p + 1) + ' of ' + totalPages + '</span>';
        page.appendChild(header);

        // Grid
        const grid = document.createElement('div');
        grid.className = 'page-grid';

        pageAssets.forEach(function(asset) {
          const qrData = 'rgr://asset/' + asset.id;
          const card = document.createElement('div');
          card.className = 'qr-card';

          // Generate QR
          const qr = qrcode(0, 'M');
          qr.addData(qrData);
          qr.make();

          const cellSize = 5;
          const modules = qr.getModuleCount();
          const size = modules * cellSize;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          canvas.style.width = size + 'px';
          canvas.style.height = size + 'px';
          const ctx = canvas.getContext('2d');
          for (var r = 0; r < modules; r++) {
            for (var c = 0; c < modules; c++) {
              ctx.fillStyle = qr.isDark(r, c) ? '#000' : '#fff';
              ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
            }
          }

          // Info section
          const info = document.createElement('div');
          info.className = 'qr-info';

          const label = document.createElement('div');
          label.className = 'qr-label';
          label.textContent = asset.asset_number;

          const typeLabel = document.createElement('div');
          typeLabel.className = 'qr-type';
          typeLabel.textContent = asset.category;

          const uuidLabel = document.createElement('div');
          uuidLabel.className = 'qr-uuid';
          uuidLabel.textContent = asset.id;

          info.appendChild(label);
          info.appendChild(typeLabel);
          info.appendChild(uuidLabel);

          card.appendChild(canvas);
          card.appendChild(info);
          grid.appendChild(card);
        });

        page.appendChild(grid);

        // Footer
        const footer = document.createElement('div');
        footer.className = 'page-footer';
        footer.textContent = 'RGR Fleet Management — Generated ' + new Date().toLocaleDateString('en-AU');
        page.appendChild(footer);

        pdfContent.appendChild(page);
      }

      const trailers = sorted.filter(a => a.category === 'trailer').length;
      const dollies = sorted.filter(a => a.category === 'dolly').length;
      const other = sorted.length - trailers - dollies;
      document.getElementById('asset-count').textContent =
        sorted.length + ' assets | ' + trailers + ' trailers, ' + dollies + ' dollies' +
        (other > 0 ? ', ' + other + ' other' : '') + ' | ' + totalPages + ' pages';
    }

    // ── One-click PDF Export ──
    function exportPDF() {
      const btn = document.getElementById('export-btn');
      btn.textContent = 'Generating...';
      btn.disabled = true;

      const element = document.getElementById('pdf-content');
      const opt = {
        margin:       0,
        filename:     'RGR-Asset-QR-Codes.pdf',
        image:        { type: 'jpeg', quality: 1 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak:    { mode: 'css', before: '.page' }
      };

      html2pdf().set(opt).from(element).save().then(function() {
        btn.textContent = 'Export PDF';
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
